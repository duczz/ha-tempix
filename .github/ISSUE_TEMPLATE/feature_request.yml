name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check [existing issues](https://github.com/duczz/ha-tempix/issues) to see if this has already been requested.

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear and concise description of what you want.
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use case / motivation
      description: Why would this feature be useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've tried?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
