name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '💥 Breaking Changes'
    labels:
      - 'breaking'
      - 'breaking-change'

  - title: '✨ New Features'
    labels:
      - 'enhancement'
      - 'feature'

  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
      - 'bugfix'

  - title: '⚡ Performance'
    labels:
      - 'performance'

  - title: '🔧 Improvements & Refactoring'
    labels:
      - 'refactoring'
      - 'improvement'

  - title: '🌐 Translations'
    labels:
      - 'translation'
      - 'i18n'

  - title: '📖 Documentation'
    labels:
      - 'documentation'
      - 'docs'

  - title: '🔩 Dependencies'
    labels:
      - 'dependencies'
      - 'build'

  - title: '🔁 CI/CD'
    labels:
      - 'ci'
      - 'ci/cd'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'breaking'
      - 'breaking-change'
  minor:
    labels:
      - 'enhancement'
      - 'feature'
  patch:
    labels:
      - 'bug'
      - 'fix'
      - 'bugfix'
      - 'performance'
      - 'refactoring'
      - 'improvement'
      - 'dependencies'
      - 'documentation'
  default: patch

template: |
  ## 🌡️ Tempix $RESOLVED_VERSION

  $CHANGES

  ---
  **Full Changelog**: https://github.com/duczz/ha-tempix/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
